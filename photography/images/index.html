<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied - Unauthorized</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
            color: #e6e6e6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 30%, rgba(50, 50, 100, 0.3) 0%, transparent 50%);
            pointer-events: none;
        }

        .container {
            text-align: center;
            max-width: 600px;
            z-index: 1;
            padding: 40px;
            background: rgba(25, 25, 35, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .error-icon {
            font-size: 4rem;
            color: #ff4757;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 20px;
            color: #ffffff;
            text-shadow: 0 2px 10px rgba(255, 71, 87, 0.3);
            font-weight: 700;
        }

        .error-code {
            font-size: 1.2rem;
            color: #a0a0b0;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        .message {
            font-size: 1.3rem;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #d0d0d0;
        }

        .illustration {
            margin: 30px 0;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
        }

        .illustration img {
            width: 100%;
            height: auto;
            display: block;
        }

        .actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 30px;
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(45deg, #ff4757, #ff6b81);
            color: white;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .btn-primary:hover {
            background: linear-gradient(45deg, #ff6b81, #ff4757);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .support-contact {
            margin-top: 25px;
            font-size: 0.9rem;
            color: #888899;
        }

        .support-contact a {
            color: #4ecdc4;
            text-decoration: none;
        }

        .support-contact a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
                margin: 0 15px;
            }
            
            h1 {
                font-size: 2.2rem;
            }
            
            .message {
                font-size: 1.1rem;
            }
            
            .btn {
                padding: 12px 25px;
                font-size: 0.9rem;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.8rem;
            }
            
            .error-icon {
                font-size: 3rem;
            }
            
            .actions {
                flex-direction: column;
                align-items: center;
            }
            
            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-icon">🔒</div>
        <h1>Access Denied</h1>
        <div class="error-code">ERROR 403 - UNAUTHORIZED ACCESS</div>
        
        <p class="message">
            You do not have permission to access this page. This area is restricted to authorized users only.
        </p>



        <div class="actions">
            <a href="https://portfolio.ekaushal.space/photography/" class="btn btn-primary">
                <span>←</span> Return to Homepage
            </a>
            <a href="mailto:kaushalmalvi412@gmail.com" class="btn btn-secondary">
                Contact Support
            </a>
        </div>

        <div class="support-contact">
            Need access? <a href="mailto:kaushalmalvi412@gmail.com">Request permissions</a>
        </div>
    </div>

    <script>
        // Add some subtle interactive effects
        document.addEventListener('DOMContentLoaded', function() {
            const container = document.querySelector('.container');
            
            // Add mouse move parallax effect
            document.addEventListener('mousemove', function(e) {
                const x = (window.innerWidth / 2 - e.clientX) / 25;
                const y = (window.innerHeight / 2 - e.clientY) / 25;
                container.style.transform = `translate(${x}px, ${y}px)`;
            });

            // Add entrance animation
            setTimeout(() => {
                container.style.opacity = '1';
                container.style.transform = 'translateY(0)';
            }, 100);

            // Initial styles for animation
            container.style.opacity = '0';
            container.style.transform = 'translateY(20px)';
            container.style.transition = 'all 0.6s ease';
        });
    </script>
</body>
</html>
