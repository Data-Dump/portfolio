<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - 404 Error</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
            color: #e6e6e6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 30%, rgba(50, 50, 100, 0.3) 0%, transparent 50%);
            pointer-events: none;
        }

        .container {
            text-align: center;
            max-width: 600px;
            z-index: 1;
            padding: 40px;
            background: rgba(25, 25, 35, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .error-icon {
            font-size: 4rem;
            color: #4ecdc4;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            color: #ffffff;
            text-shadow: 0 2px 10px rgba(78, 205, 196, 0.3);
            font-weight: 700;
        }

        .error-code {
            font-size: 1.2rem;
            color: #a0a0b0;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        .message {
            font-size: 1.3rem;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #d0d0d0;
        }

        .illustration {
            margin: 30px 0;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
        }

        .illustration img {
            width: 100%;
            height: auto;
            display: block;
        }

        .actions {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 30px;
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(45deg, #4ecdc4, #44a08d);
            color: white;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .btn-primary:hover {
            background: linear-gradient(45deg, #44a08d, #4ecdc4);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .search-box {
            margin-top: 25px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .search-input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            color: white;
            font-size: 1rem;
            margin-bottom: 10px;
        }

        .search-input:focus {
            outline: none;
            border-color: #4ecdc4;
            box-shadow: 0 0 0 2px rgba(78, 205, 196, 0.2);
        }

        .quick-links {
            margin-top: 25px;
            font-size: 0.9rem;
            color: #888899;
        }

        .quick-links a {
            color: #4ecdc4;
            text-decoration: none;
            margin: 0 8px;
        }

        .quick-links a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
                margin: 0 15px;
            }
            
            h1 {
                font-size: 2.2rem;
            }
            
            .message {
                font-size: 1.1rem;
            }
            
            .btn {
                padding: 12px 25px;
                font-size: 0.9rem;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.8rem;
            }
            
            .error-icon {
                font-size: 3rem;
            }
            
            .actions {
                flex-direction: column;
                align-items: center;
            }
            
            .btn {
                width: 100%;
                justify-content: center;
            }
            
            .quick-links {
                display: flex;
                flex-direction: column;
                gap: 8px;
            }
            
            .quick-links a {
                margin: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-icon">🔍</div>
        <h1>Page Not Found</h1>
        <div class="error-code">ERROR 404 - PAGE NOT FOUND</div>
        
        <p class="message">
            The page you're looking for seems to have wandered off into the digital wilderness. It might have been moved, deleted, or never existed in the first place.
        </p>

        <div class="actions">
            <a href="javascript:history.back()" class="btn btn-secondary">
                <span>↩️</span> Go Back
            </a>
        </div>
    </div>

    <script>
        // Add some subtle interactive effects
        document.addEventListener('DOMContentLoaded', function() {
            const container = document.querySelector('.container');
            
            // Add mouse move parallax effect
            document.addEventListener('mousemove', function(e) {
                const x = (window.innerWidth / 2 - e.clientX) / 25;
                const y = (window.innerHeight / 2 - e.clientY) / 25;
                container.style.transform = `translate(${x}px, ${y}px)`;
            });

            // Add entrance animation
            setTimeout(() => {
                container.style.opacity = '1';
                container.style.transform = 'translateY(0)';
            }, 100);

            // Initial styles for animation
            container.style.opacity = '0';
            container.style.transform = 'translateY(20px)';
            container.style.transition = 'all 0.6s ease';
        });

        // Handle search functionality
        function handleSearch(event) {
            if (event.key === 'Enter') {
                const searchTerm = event.target.value.trim();
                if (searchTerm) {
                    // Simple search implementation - redirect to search page with query
                    window.location.href = `/search?q=${encodeURIComponent(searchTerm)}`;
                }
            }
        }

        // Add some random floating particles in the background
        function createParticles() {
            const particles = document.createElement('div');
            particles.style.position = 'fixed';
            particles.style.top = '0';
            particles.style.left = '0';
            particles.style.width = '100%';
            particles.style.height = '100%';
            particles.style.pointerEvents = 'none';
            particles.style.zIndex = '0';
            
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.style.position = 'absolute';
                particle.style.width = '2px';
                particle.style.height = '2px';
                particle.style.background = 'rgba(78, 205, 196, 0.6)';
                particle.style.borderRadius = '50%';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animation = `floatParticle ${3 + Math.random() * 4}s ease-in-out infinite`;
                particles.appendChild(particle);
            }
            
            document.body.appendChild(particles);
        }

        // Add CSS for particle animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes floatParticle {
                0%, 100% { 
                    transform: translate(0, 0) scale(1);
                    opacity: 0.3;
                }
                50% { 
                    transform: translate(${Math.random() * 40 - 20}px, ${Math.random() * 40 - 20}px) scale(1.5);
                    opacity: 0.8;
                }
            }
        `;
        document.head.appendChild(style);

        // Create particles after page load
        window.addEventListener('load', createParticles);
    </script>
</body>
</html>
