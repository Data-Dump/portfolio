<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaushal Malvi — Portfolio</title>
    <meta name="description" content="Kaushal Malvi — Founder, entrepreneur, and creative. Explore my main portfolio and photography work.">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --cream: #f5f0e8;
            --gold: #c9a84c;
            --gold-light: #e8c97a;
            --dark: #0d0c0a;
            --dark-2: #141210;
            --muted: #6b6560;
            --text: #e8e0d0;
            --border: rgba(201, 168, 76, 0.18);
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--dark);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* ─── Ambient Orbs ─── */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
            opacity: 0;
            animation: orbReveal 2s ease forwards;
        }
        .orb-1 {
            width: 520px; height: 520px;
            top: -120px; left: -100px;
            background: radial-gradient(circle, rgba(201,168,76,0.18) 0%, transparent 70%);
            animation-delay: 0.2s;
        }
        .orb-2 {
            width: 400px; height: 400px;
            bottom: -80px; right: -80px;
            background: radial-gradient(circle, rgba(180,100,60,0.14) 0%, transparent 70%);
            animation-delay: 0.5s;
        }
        .orb-3 {
            width: 300px; height: 300px;
            top: 50%; left: 55%;
            background: radial-gradient(circle, rgba(201,168,76,0.08) 0%, transparent 70%);
            animation-delay: 0.8s;
        }
        @keyframes orbReveal {
            to { opacity: 1; }
        }

        /* ─── Noise Texture Overlay ─── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 1;
            opacity: 0.4;
        }

        /* ─── Grid Lines ─── */
        .grid-lines {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(201,168,76,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(201,168,76,0.03) 1px, transparent 1px);
            background-size: 80px 80px;
        }

        /* ─── Layout ─── */
        .wrapper {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 4rem 1.5rem 2rem;
            text-align: center;
        }

        /* ─── Header Label ─── */
        .label {
            font-family: 'Inter', sans-serif;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--gold);
            border: 1px solid var(--border);
            padding: 0.4rem 1rem;
            border-radius: 100px;
            background: rgba(201,168,76,0.06);
            margin-bottom: 2.5rem;
            opacity: 0;
            transform: translateY(16px);
            animation: fadeUp 0.7s ease 0.3s forwards;
        }

        /* ─── Name ─── */
        .name {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3.5rem, 10vw, 8rem);
            font-weight: 900;
            line-height: 1;
            color: var(--cream);
            letter-spacing: -0.02em;
            margin-bottom: 1.5rem;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.9s ease 0.5s forwards;
        }

        .name span {
            background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 50%, #a87830 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ─── Divider ─── */
        .divider {
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 0 auto 1.8rem;
            opacity: 0;
            animation: fadeIn 0.8s ease 0.9s forwards;
        }

        /* ─── Bio ─── */
        .bio {
            font-size: clamp(0.9rem, 2vw, 1.05rem);
            font-weight: 300;
            color: #9a9080;
            line-height: 1.8;
            max-width: 520px;
            margin-bottom: 3.5rem;
            opacity: 0;
            transform: translateY(16px);
            animation: fadeUp 0.8s ease 1s forwards;
        }

        .bio strong {
            font-weight: 500;
            color: #c8bfac;
        }

        /* ─── Portfolio Cards ─── */
        .portfolio-links {
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
            width: 100%;
            max-width: 440px;
            margin-bottom: 3.5rem;
            opacity: 0;
            transform: translateY(16px);
            animation: fadeUp 0.8s ease 1.2s forwards;
        }

        .portfolio-link {
            position: relative;
            display: flex;
            align-items: center;
            gap: 1.25rem;
            padding: 1.25rem 1.5rem;
            background: rgba(255,255,255,0.025);
            border: 1px solid var(--border);
            border-radius: 14px;
            text-decoration: none;
            color: var(--cream);
            overflow: hidden;
            transition: border-color 0.3s ease, transform 0.3s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s ease, background 0.3s ease;
            backdrop-filter: blur(8px);
        }

        .portfolio-link::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, rgba(201,168,76,0.07) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .portfolio-link:hover::before { opacity: 1; }

        .portfolio-link:hover {
            border-color: rgba(201,168,76,0.4);
            transform: translateX(4px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.45), -4px 0 0 var(--gold);
            background: rgba(255,255,255,0.04);
        }

        .link-icon-wrap {
            flex-shrink: 0;
            width: 44px;
            height: 44px;
            border-radius: 10px;
            background: rgba(201,168,76,0.1);
            border: 1px solid rgba(201,168,76,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: var(--gold);
            transition: background 0.3s ease, transform 0.3s ease;
        }

        .portfolio-link:hover .link-icon-wrap {
            background: rgba(201,168,76,0.18);
            transform: scale(1.08);
        }

        .link-text {
            flex: 1;
            text-align: left;
        }

        .link-label {
            font-size: 0.6rem;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--gold);
            opacity: 0.8;
            margin-bottom: 0.2rem;
            display: block;
        }

        .link-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--cream);
            line-height: 1.2;
        }

        .link-arrow {
            flex-shrink: 0;
            font-size: 1rem;
            color: var(--muted);
            transition: color 0.3s ease, transform 0.3s ease;
        }

        .portfolio-link:hover .link-arrow {
            color: var(--gold);
            transform: translate(3px, -3px);
        }

        /* ─── Social Icons ─── */
        .social-icons {
            display: flex;
            gap: 1rem;
            opacity: 0;
            animation: fadeIn 0.8s ease 1.5s forwards;
        }

        .social-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.02);
            color: var(--muted);
            font-size: 1.1rem;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
            backdrop-filter: blur(6px);
        }

        .social-icon:hover {
            color: var(--cream);
            border-color: rgba(201,168,76,0.4);
            background: rgba(201,168,76,0.08);
            transform: translateY(-3px) scale(1.12);
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }

        .social-icon.instagram:hover {
            background: linear-gradient(45deg, rgba(240,148,51,0.2), rgba(188,24,136,0.2));
            border-color: rgba(220,39,67,0.4);
        }
        .social-icon.mail:hover {
            background: rgba(201,168,76,0.12);
        }
        .social-icon.linkedin:hover {
            background: rgba(0,119,181,0.15);
            border-color: rgba(0,119,181,0.4);
        }
        .social-icon.twitter:hover {
            background: rgba(29,161,242,0.12);
            border-color: rgba(29,161,242,0.4);
        }

        /* ─── Footer ─── */
        footer {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 1.5rem;
            font-size: 0.72rem;
            font-weight: 400;
            letter-spacing: 0.08em;
            color: #3a3530;
            opacity: 0;
            animation: fadeIn 1s ease 1.8s forwards;
        }

        /* ─── Cursor Glow ─── */
        .cursor-glow {
            position: fixed;
            width: 350px;
            height: 350px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(201,168,76,0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 1;
            transform: translate(-50%, -50%);
            transition: left 0.12s ease, top 0.12s ease;
            will-change: left, top;
        }

        /* ─── Animations ─── */
        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* ─── Responsive ─── */
        @media (max-width: 600px) {
            .portfolio-links {
                flex-direction: column;
                width: 100%;
                max-width: 300px;
            }
            .portfolio-link {
                min-width: unset;
                width: 100%;
            }
            main { padding: 5rem 1.25rem 2rem; }
        }
    </style>
</head>
<body>

    <!-- Ambient -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="grid-lines"></div>
    <div class="cursor-glow" id="cursorGlow"></div>

    <div class="wrapper">
        <main>
            <p class="label">Portfolio — 2026</p>

            <h1 class="name">Kaushal <span>Malvi</span></h1>

            <div class="divider"></div>

            <p class="bio">
                Founder &amp; CEO of <strong>Kleanzol Pvt. Ltd.</strong> &nbsp;·&nbsp;
                Co-Owner of <strong>Ashirwad Stationery</strong><br>
                Building brands with purpose, innovation &amp; grit.
            </p>

            <div class="portfolio-links">
                <a href="main/" class="portfolio-link" id="link-main">
                    <span class="link-icon-wrap"><i class="bi bi-person-lines-fill"></i></span>
                    <span class="link-text">
                        <span class="link-label">Work &amp; Projects</span>
                        <span class="link-title">Main Portfolio</span>
                    </span>
                    <span class="link-arrow"><i class="bi bi-arrow-up-right"></i></span>
                </a>
                <a href="photography/" class="portfolio-link" id="link-photo">
                    <span class="link-icon-wrap"><i class="bi bi-camera2"></i></span>
                    <span class="link-text">
                        <span class="link-label">Visual Stories</span>
                        <span class="link-title">Photography Portfolio</span>
                    </span>
                    <span class="link-arrow"><i class="bi bi-arrow-up-right"></i></span>
                </a>
            </div>

            <div class="social-icons" id="social-icons">
                <a href="https://instagram.com/beyondframezz" class="social-icon instagram" target="_blank" rel="noopener" aria-label="Instagram">
                    <i class="bi bi-instagram"></i>
                </a>
                <a href="mailto:contact@kaushal.sbs" class="social-icon mail" aria-label="Email">
                    <i class="bi bi-envelope-fill"></i>
                </a>
                <a href="https://www.linkedin.com/in/kaushalmalvi/" class="social-icon linkedin" target="_blank" rel="noopener" aria-label="LinkedIn">
                    <i class="bi bi-linkedin"></i>
                </a>
                <a href="https://twitter.com/_kaushalmalvi_" class="social-icon twitter" target="_blank" rel="noopener" aria-label="Twitter">
                    <i class="bi bi-twitter"></i>
                </a>
            </div>
        </main>

        <footer>
            <p>© 2026 Kaushal Malvi &nbsp;·&nbsp; All rights reserved</p>
        </footer>
    </div>

    <script>
        // Cursor glow follow
        const glow = document.getElementById('cursorGlow');
        document.addEventListener('mousemove', e => {
            glow.style.left = e.clientX + 'px';
            glow.style.top  = e.clientY + 'px';
        });

        // Subtle orb movement on mouse
        const orb1 = document.querySelector('.orb-1');
        const orb3 = document.querySelector('.orb-3');
        document.addEventListener('mousemove', e => {
            const x = (e.clientX / window.innerWidth  - 0.5) * 30;
            const y = (e.clientY / window.innerHeight - 0.5) * 30;
            orb1.style.transform = `translate(${x * 0.4}px, ${y * 0.4}px)`;
            orb3.style.transform = `translate(${-x * 0.2}px, ${-y * 0.2}px)`;
        });
    </script>
</body>
</html>
